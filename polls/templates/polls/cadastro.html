{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="{% static 'users.css' %}">
</head>
<body>
  <div class="container">
    <div class="login-box">
      <h1>Cadastro</h1>
      <form action="{% url 'cadastro' %}" method="POST">{% csrf_token %}
        <input type="text" placeholder="Usuário" class="input-field" name="usuario">
        <input type="password" placeholder="Senha" class="input-field" name="senha">
        <button type="submit" class="btn">Entrar</button>
        {% if user_exist %}
          <p>O usuario escolhido já existe</p>
        {% endif %}
        {% if vazio %}
          <p>Informe os valores do formulário</p>
        {% endif %}
      </form>
    </div>
  </div>
</body>
</html>
