{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="{% static 'users.css' %}">
</head>
<body>
  <div class="container">
    <div class="login-box">
      <h1>Login</h1>
      <form action="{% url 'register' %}" method="POST">{% csrf_token %}
        <input type="text" placeholder="Usuário" class="input-field" name="usuario">
        <input type="password" placeholder="Senha" class="input-field" name="senha">
        <button type="submit" class="btn">Entrar</button>
        {% if verificacao %}
            <p class="error-message">Usuário ou senha está incorreto</p>
        {% endif %}
        
      </form>
      <div class="links">
        <a href="{% url 'mudarsenha' %}">Esqueci a senha</a>
        <a href="{% url 'cadastro' %}">Cadastre-se</a>
      </div>
    </div>
  </div>
</body>
</html>
